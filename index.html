<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>MD Notes</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.15.3/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.15.3/ext-language_tools.min.js"></script>
    <script
        type="module"
        src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"
    ></script>
    <script defer src="note.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        #tools {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            padding: 0 8px;
            margin: 0;
            background-color: rgba(255, 255, 255, 0.9);
            border-top: 1px solid #ddd;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #tools a {
            text-decoration: none;
            font-size: 20px;
            cursor: pointer;
        }

        #tools button {
            width: 24px;
            height: 24px;
            border: 2px solid #999;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        #tools button:hover {
            transform: scale(1.1);
        }

        #tools button.active {
            border-color: #333;
            border-width: 3px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
        }

        #main {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 50px;
            display: flex;
            align-items: stretch;
        }

        #editor-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        #editor {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        #divider {
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background-color: #ddd;
            flex-shrink: 0;
            transition: background-color 0.2s;
            position: relative;
        }

        #divider:hover {
            background-color: #999;
        }

        #divider::after {
            content: '';
            position: absolute;
            left: -2px;
            right: -2px;
            top: 0;
            bottom: 0;
        }

        #preview-container {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        zero-md {
            display: block;
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="tools">
        <button class="color-tab active" style="background-color: rgb(238, 229, 148);" data-color="yellow" title="Yellow tab"></button>
        <button class="color-tab" style="background-color: rgb(159, 223, 163);" data-color="green" title="Green tab"></button>
        <button class="color-tab" style="background-color: rgb(240, 153, 140);" data-color="red" title="Red tab"></button>
        <button class="color-tab" style="background-color: rgb(124, 205, 255);" data-color="blue" title="Blue tab"></button>
        <button class="color-tab" style="background-color: rgb(201, 171, 238);" data-color="purple" title="Purple tab"></button>
        <button class="color-tab" style="background-color: lightgray;" data-color="gray" title="Gray tab"></button>
        <div style="flex-grow: 1;"></div>
        <a href="#" id="toggle-editor-btn" title="Toggle editor">✏️</a>
        <a href="#" id="save-btn" title="Save note">💾</a>
        <a href="#" id="dark-mode-btn" title="Toggle dark mode">🌑</a>
    </div>
    <div id="main">
        <div id="editor-container">
            <div id="editor"></div>
        </div>
        <div id="divider"></div>
        <div id="preview-container">
            <zero-md>
                <script type="text/markdown" id="disp"></script>
            </zero-md>
        </div>
    </div>
</body>
</html>
